name: Update README cards

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/update-readme-cards.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_border=true&include_all_commits=true&card_width=400&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_border=true&langs_count=6&card_width=400
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert SVG to PNG (Inkscape — librsvg/rsvg often strips readme-stats text/icons/metrics)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape
          # 2× README display width (400) so labels stay sharp after Camo/GitHub scaling
          inkscape profile/stats.svg \
            --export-type=png \
            --export-filename=profile/stats.png \
            --export-width=800 \
            --export-area-page \
            --export-overwrite
          inkscape profile/top-langs.svg \
            --export-type=png \
            --export-filename=profile/top-langs.png \
            --export-width=800 \
            --export-area-page \
            --export-overwrite

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg profile/stats.png profile/top-langs.png
          git commit -m "chore: update README stats cards" || exit 0
          git push
