# Profile README embeds PNGs; gaps vs opening profile/*.svg in a browser are usually runner font/rasterization—not wrong SVG on GitHub.
name: Update README cards

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: readme-stats-cards
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_border=true&include_all_commits=true&card_width=400&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_border=true&langs_count=6&card_width=400
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rasterize SVG to PNG (headless Chromium — same text rendering as desktop browsers)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get -f install -y
          raster() {
            local svg_rel="$1"
            local png_rel="$2"
            local abssvg outdir outbase
            abssvg=$(readlink -f "$svg_rel")
            outdir=$(readlink -f "$(dirname "$png_rel")")
            outbase=$(basename "$png_rel")
            mkdir -p "$outdir"
            google-chrome-stable \
              --headless=new \
              --no-sandbox \
              --disable-gpu \
              --disable-dev-shm-usage \
              --hide-scrollbars \
              --force-device-scale-factor=2 \
              --window-size=1000,2400 \
              --virtual-time-budget=8000 \
              --screenshot="${outdir}/${outbase}" \
              "file://${abssvg}"
          }
          raster profile/stats.svg profile/stats.png
          raster profile/top-langs.svg profile/top-langs.png

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg profile/stats.png profile/top-langs.png
          git commit -m "chore: update README stats cards" || exit 0
          git push
